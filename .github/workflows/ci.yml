name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: marketplace_test
          POSTGRES_USER: marketplace
          POSTGRES_PASSWORD: marketplace
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U marketplace -d marketplace_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://marketplace:marketplace@localhost:5432/marketplace_test
      TEST_DATABASE_URL: postgres://marketplace:marketplace@localhost:5432/marketplace_test
      JWT_SECRET: ci-secret-aaaaaaaaaaaaaaaaaaaaaaaa
      METRICS_PASSWORD: ci-metrics-password-aaaa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run migrate
      - run: npm run lint
      - run: npm test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_WS_URL: ws://localhost:4000/ws
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      # Missing/extra translation keys and new hardcoded UI strings fail the build.
      - run: npm run i18n:check
      # Catches build-time-only failures (e.g. broken static generation, bad imports in
      # client/server boundaries) that `tsc --noEmit` alone doesn't see.
      - run: npm run build
