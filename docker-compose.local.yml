name: skrynia2local

services:
  postgres:
    ports: !override
      - "15432:5432"

  redis:
    ports: !override
      - "16379:6379"

  backend:
    environment:
      FRONTEND_URL: http://localhost:13000
      PUBLIC_BACKEND_URL: http://localhost:14000
    ports: !override
      - "14000:4000"

  frontend:
    environment:
      NEXT_PUBLIC_SITE_URL: http://localhost:13000
      NEXT_PUBLIC_WS_URL: ws://localhost:14000/ws
    ports: !override
      - "13000:3000"
