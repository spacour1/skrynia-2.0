services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-marketplace}
      POSTGRES_USER: ${POSTGRES_USER:-marketplace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketplace -d marketplace"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgres://${POSTGRES_USER:-marketplace}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/${POSTGRES_DB:-marketplace}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env to a long random production secret}
      TWO_FACTOR_ENCRYPTION_KEY: ${TWO_FACTOR_ENCRYPTION_KEY:?TWO_FACTOR_ENCRYPTION_KEY must be set in .env}
      TWO_FACTOR_ENCRYPTION_KEY_VERSION: ${TWO_FACTOR_ENCRYPTION_KEY_VERSION:-1}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      PUBLIC_BACKEND_URL: ${PUBLIC_BACKEND_URL:-http://localhost:4000}
      PLATFORM_FEE_BPS: ${PLATFORM_FEE_BPS:-1000}
      AUTO_RELEASE_HOURS: ${AUTO_RELEASE_HOURS:-72}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      LOCAL_UPLOAD_DIR: uploads
      MEDIA_PUBLIC_BASE_URL: ${MEDIA_PUBLIC_BASE_URL:-}
      STORAGE_TEMP_TTL_HOURS: ${STORAGE_TEMP_TTL_HOURS:-24}
      STORAGE_MAX_IMAGE_WIDTH: ${STORAGE_MAX_IMAGE_WIDTH:-8192}
      STORAGE_MAX_IMAGE_HEIGHT: ${STORAGE_MAX_IMAGE_HEIGHT:-8192}
      STORAGE_MAX_IMAGE_PIXELS: ${STORAGE_MAX_IMAGE_PIXELS:-40000000}
      STORAGE_DAILY_UPLOAD_BYTES_PER_USER: ${STORAGE_DAILY_UPLOAD_BYTES_PER_USER:-104857600}
      STORAGE_TOTAL_QUOTA_BYTES_PER_USER: ${STORAGE_TOTAL_QUOTA_BYTES_PER_USER:-524288000}
      STORAGE_MAX_OBJECTS_PER_PURPOSE: ${STORAGE_MAX_OBJECTS_PER_PURPOSE:-500}
      STORAGE_MAX_CONCURRENT_PROCESSING: ${STORAGE_MAX_CONCURRENT_PROCESSING:-4}
      STORAGE_PROCESSING_QUEUE_LIMIT: ${STORAGE_PROCESSING_QUEUE_LIMIT:-16}
      UPLOAD_RATE_LIMIT_PER_MIN: ${UPLOAD_RATE_LIMIT_PER_MIN:-20}
      UPLOAD_RATE_LIMIT_PER_IP: ${UPLOAD_RATE_LIMIT_PER_IP:-60}
      PG_POOL_MAX: ${PG_POOL_MAX:-10}
      # API replicas must NOT run the job worker — run one dedicated worker service instead.
      JOB_WORKER_ENABLED: ${JOB_WORKER_ENABLED:-false}
      OUTBOX_WORKER_ENABLED: ${OUTBOX_WORKER_ENABLED:-false}
      # Set to 1 when running behind Railway / Fly / Cloudflare so req.ip uses real client IP.
      TRUST_PROXY: ${TRUST_PROXY:-1}
      PUBLIC_READ_RATE_LIMIT_PER_MIN: ${PUBLIC_READ_RATE_LIMIT_PER_MIN:-600}
      ANONYMOUS_WRITE_RATE_LIMIT_PER_MIN: ${ANONYMOUS_WRITE_RATE_LIMIT_PER_MIN:-60}
      CREDENTIAL_RATE_LIMIT_PER_15MIN: ${CREDENTIAL_RATE_LIMIT_PER_15MIN:-20}
      CREDENTIAL_RATE_LIMIT_PER_IDENTITY_15MIN: ${CREDENTIAL_RATE_LIMIT_PER_IDENTITY_15MIN:-20}
      AUTHENTICATED_WRITE_RATE_LIMIT_PER_MIN: ${AUTHENTICATED_WRITE_RATE_LIMIT_PER_MIN:-60}
      AUTHENTICATED_WRITE_RATE_LIMIT_PER_IP: ${AUTHENTICATED_WRITE_RATE_LIMIT_PER_IP:-300}
      WS_TICKET_RATE_LIMIT_PER_MIN: ${WS_TICKET_RATE_LIMIT_PER_MIN:-30}
      WS_TICKET_RATE_LIMIT_PER_IP: ${WS_TICKET_RATE_LIMIT_PER_IP:-120}
      WS_MAX_BUFFERED_BYTES: ${WS_MAX_BUFFERED_BYTES:-1048576}
      WS_MAX_ROOMS_PER_CONNECTION: ${WS_MAX_ROOMS_PER_CONNECTION:-50}
      REALTIME_CHANNEL: ${REALTIME_CHANNEL:-skrynia:realtime:v1}
      PRESENCE_TTL_MS: ${PRESENCE_TTL_MS:-90000}
      PRESENCE_HEARTBEAT_MS: ${PRESENCE_HEARTBEAT_MS:-30000}
      PHONE_OTP_RATE_LIMIT_PER_15MIN: ${PHONE_OTP_RATE_LIMIT_PER_15MIN:-10}
      PHONE_OTP_RATE_LIMIT_PER_IP_15MIN: ${PHONE_OTP_RATE_LIMIT_PER_IP_15MIN:-30}
      EMAIL_VERIFICATION_RATE_LIMIT_PER_15MIN: ${EMAIL_VERIFICATION_RATE_LIMIT_PER_15MIN:-10}
      EMAIL_VERIFICATION_RATE_LIMIT_PER_IP_15MIN: ${EMAIL_VERIFICATION_RATE_LIMIT_PER_IP_15MIN:-30}
      PASSWORD_RESET_RATE_LIMIT_PER_15MIN: ${PASSWORD_RESET_RATE_LIMIT_PER_15MIN:-10}
      PASSWORD_RESET_RATE_LIMIT_PER_IP_15MIN: ${PASSWORD_RESET_RATE_LIMIT_PER_IP_15MIN:-30}
      WEBHOOK_RATE_LIMIT_PER_MIN: ${WEBHOOK_RATE_LIMIT_PER_MIN:-60}
      METRICS_USER: ${METRICS_USER:-metrics}
      METRICS_PASSWORD: ${METRICS_PASSWORD:?METRICS_PASSWORD must be set in .env}
      # Sentry (optional — leave unset to disable error tracking)
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      # S3-compatible object storage (required for multi-replica uploads)
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-auto}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      # Payment providers
      LIQPAY_PUBLIC_KEY: ${LIQPAY_PUBLIC_KEY:-}
      LIQPAY_PRIVATE_KEY: ${LIQPAY_PRIVATE_KEY:-}
      LIQPAY_SERVER_URL: ${LIQPAY_SERVER_URL:-}
      MONOBANK_TOKEN: ${MONOBANK_TOKEN:-}
      MONOBANK_WEBHOOK_URL: ${MONOBANK_WEBHOOK_URL:-}
      MANUAL_PAYMENT_CARD_NUMBER: ${MANUAL_PAYMENT_CARD_NUMBER:-}
      MANUAL_PAYMENT_RECEIVER_NAME: ${MANUAL_PAYMENT_RECEIVER_NAME:-}
      MANUAL_PAYMENT_BANK: ${MANUAL_PAYMENT_BANK:-}
      WAYFORPAY_MERCHANT_ACCOUNT: ${WAYFORPAY_MERCHANT_ACCOUNT:-}
      WAYFORPAY_MERCHANT_SECRET_KEY: ${WAYFORPAY_MERCHANT_SECRET_KEY:-}
      WAYFORPAY_SERVICE_URL: ${WAYFORPAY_SERVICE_URL:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      ENABLE_TEST_PAYMENTS: ${ENABLE_TEST_PAYMENTS:-false}
    ports:
      - "4000:4000"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Dedicated job worker — runs BullMQ consumers (escrow release, payouts, reconciliation).
  # Scale to exactly 1 replica. API replicas above must have JOB_WORKER_ENABLED=false.
  worker:
    build:
      context: ./backend
    environment:
      NODE_ENV: production
      PORT: 4001
      DATABASE_URL: postgres://${POSTGRES_USER:-marketplace}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/${POSTGRES_DB:-marketplace}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env to a long random production secret}
      TWO_FACTOR_ENCRYPTION_KEY: ${TWO_FACTOR_ENCRYPTION_KEY:?TWO_FACTOR_ENCRYPTION_KEY must be set in .env}
      TWO_FACTOR_ENCRYPTION_KEY_VERSION: ${TWO_FACTOR_ENCRYPTION_KEY_VERSION:-1}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      PUBLIC_BACKEND_URL: ${PUBLIC_BACKEND_URL:-http://localhost:4000}
      PLATFORM_FEE_BPS: ${PLATFORM_FEE_BPS:-1000}
      AUTO_RELEASE_HOURS: ${AUTO_RELEASE_HOURS:-72}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      LOCAL_UPLOAD_DIR: uploads
      MEDIA_PUBLIC_BASE_URL: ${MEDIA_PUBLIC_BASE_URL:-}
      STORAGE_TEMP_TTL_HOURS: ${STORAGE_TEMP_TTL_HOURS:-24}
      STORAGE_MAX_IMAGE_WIDTH: ${STORAGE_MAX_IMAGE_WIDTH:-8192}
      STORAGE_MAX_IMAGE_HEIGHT: ${STORAGE_MAX_IMAGE_HEIGHT:-8192}
      STORAGE_MAX_IMAGE_PIXELS: ${STORAGE_MAX_IMAGE_PIXELS:-40000000}
      PG_POOL_MAX: ${PG_POOL_MAX:-5}
      JOB_WORKER_ENABLED: "true"
      OUTBOX_WORKER_ENABLED: "true"
      OUTBOX_POLL_INTERVAL_MS: ${OUTBOX_POLL_INTERVAL_MS:-1000}
      OUTBOX_BATCH_SIZE: ${OUTBOX_BATCH_SIZE:-25}
      OUTBOX_CONCURRENCY: ${OUTBOX_CONCURRENCY:-5}
      OUTBOX_MAX_ATTEMPTS: ${OUTBOX_MAX_ATTEMPTS:-8}
      OUTBOX_BASE_BACKOFF_MS: ${OUTBOX_BASE_BACKOFF_MS:-1000}
      OUTBOX_LOCK_TIMEOUT_MS: ${OUTBOX_LOCK_TIMEOUT_MS:-300000}
      OUTBOX_DELIVERY_TIMEOUT_MS: ${OUTBOX_DELIVERY_TIMEOUT_MS:-5000}
      REALTIME_CHANNEL: ${REALTIME_CHANNEL:-skrynia:realtime:v1}
      PRESENCE_TTL_MS: ${PRESENCE_TTL_MS:-90000}
      PRESENCE_HEARTBEAT_MS: ${PRESENCE_HEARTBEAT_MS:-30000}
      TRUST_PROXY: "0"
      METRICS_USER: ${METRICS_USER:-metrics}
      METRICS_PASSWORD: ${METRICS_PASSWORD:?METRICS_PASSWORD must be set in .env}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-auto}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      LIQPAY_PUBLIC_KEY: ${LIQPAY_PUBLIC_KEY:-}
      LIQPAY_PRIVATE_KEY: ${LIQPAY_PRIVATE_KEY:-}
      MONOBANK_TOKEN: ${MONOBANK_TOKEN:-}
      WAYFORPAY_MERCHANT_ACCOUNT: ${WAYFORPAY_MERCHANT_ACCOUNT:-}
      WAYFORPAY_MERCHANT_SECRET_KEY: ${WAYFORPAY_MERCHANT_SECRET_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - worker

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:4000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:4000/ws}
        NEXT_PUBLIC_WS_COOKIE_FALLBACK: ${NEXT_PUBLIC_WS_COOKIE_FALLBACK:-false}
    environment:
      # Resolved by the Next.js server itself (inside this container) to proxy /api/* —
      # must be the backend's address on the docker network, not the host-facing
      # localhost:4000, or every API call 500s.
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:4000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:4000/ws}
      NEXT_PUBLIC_WS_COOKIE_FALLBACK: ${NEXT_PUBLIC_WS_COOKIE_FALLBACK:-false}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
